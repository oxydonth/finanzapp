name: API — Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'

jobs:
  build:
    name: Build, Lint & Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: finanzapp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=packages/types
          npm run build --workspace=packages/utils
          npm run build --workspace=packages/config

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finanzapp_test

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Lint
        run: npm run lint --workspace=@finanzapp/api

      - name: Run DB migrations
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finanzapp_test

      - name: Test packages/utils
        run: npm test --workspace=packages/utils

      - name: Test packages/config
        run: npm test --workspace=packages/config

      - name: Test apps/api
        run: npm test --workspace=apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finanzapp_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long-for-jwt
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars-long
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

      - name: Build
        run: npm run build --workspace=@finanzapp/api

  # ── Deploy to Render (main branch only) ───────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail-with-body \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
